server:
  port: 8080

spring:
  threads:
    virtual:
      enabled: true
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 500
        order_inserts: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  cors:
    allowed-origins: "http://localhost:4200"
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
